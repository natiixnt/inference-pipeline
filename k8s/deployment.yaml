apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-router
  namespace: inference
  labels:
    app.kubernetes.io/name: inference-pipeline
    app.kubernetes.io/component: router
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-pipeline
      app.kubernetes.io/component: router
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-pipeline
        app.kubernetes.io/component: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: inference-pipeline
      containers:
        - name: router
          image: registry.example.com/inference-pipeline:latest
          command: ["python", "-m", "inference_pipeline.serving"]
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
          env:
            - name: RAY_ADDRESS
              value: "ray-head:6379"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: inference-config
                  key: kafka.brokers
            - name: MAX_CONCURRENT_REQUESTS
              value: "500"
            - name: SCHEDULER_TICK_MS
              value: "5"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: router
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-worker-h100
  namespace: inference
  labels:
    app.kubernetes.io/name: inference-pipeline
    app.kubernetes.io/component: worker
    gpu-type: h100
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-pipeline
      app.kubernetes.io/component: worker
      gpu-type: h100
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-pipeline
        app.kubernetes.io/component: worker
        gpu-type: h100
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: inference-pipeline
      nodeSelector:
        nvidia.com/gpu.product: "NVIDIA-H100-80GB-HBM3"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: worker
          image: registry.example.com/inference-pipeline:latest
          command: ["python", "-m", "inference_pipeline.worker"]
          args:
            - "--gpu-type=H100"
            - "--kv-cache-pool-gb=60"
            - "--max-batch-size=64"
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: RAY_ADDRESS
              value: "ray-head:6379"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: NCCL_P2P_DISABLE
              value: "0"
            - name: KV_CACHE_POOL_GB
              value: "60"
          resources:
            requests:
              cpu: "8"
              memory: "64Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: "128Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-storage-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
---
